name: Domain Scanner

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Run custom domain scanner
        run: node scanner.js

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: domain-results
          path: domains-*.csv
          retention-days: 30
